<!doctype html>
<html>
  <head>
    <title>9o3o</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="static/games/flashpointarchive/main.js" defer></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      .content {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .player {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        background: #000;
      }
      .player > * {
        max-width: 100%;
        max-height: 100%;
      }
      .fullscreen-btn {
        position: absolute;
        bottom: 10px;
        right: 10px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: 1px solid #fff;
        cursor: pointer;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="header"></div>

      <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
      <div class="player" id="player"></div>

      <div class="footer">
        <div class="navigation">
          <div class="general">
            <a href="/faq">[FAQ]</a>
            <a href="https://flashpointproject.github.io/flashpoint-database/">[Browse]</a>
            <a href=".">[Random]</a>
            <div class="toggle">
              <input type="checkbox" id="extreme" checked /><label for="extreme">Filter NSFW</label>
            </div>
          </div>
          <div class="entry">
            <a href="" class="info" target="_blank">[More info]</a>
            <a href="" class="link">[Direct link]</a>
          </div>
        </div>
        <div class="compatibility">
          <div class="rating">
            <b>Compatibility rating:</b> <span class="fraction">N/A</span> (<span class="total">0</span> votes)
          </div>
          <div class="vote">
            Is this entry working? <span class="button working">[Yes]</span> or <span class="button broken">[No]</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleFullscreen() {
        const el = document.getElementById("player");
        if (!document.fullscreenElement) {
          el.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      }
    </script>
  </body>
</html>
