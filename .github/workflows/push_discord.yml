name: Discord Notify

on:
  push:
  pull_request:
  issues:
  issue_comment:
  release:
  watch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm -v

      - name: Handle Discord notifications
        shell: bash
        run: |
          set -e

          EVENT="${{ github.event_name }}"

          case "$EVENT" in
            push|pull_request|issues|issue_comment|release|watch) ;;
            *)
              echo "Ignoring unsupported event: $EVENT"
              exit 0
              ;;
          esac

          if [ "$EVENT" = "push" ]; then

            if [ "${{ github.actor }}" = "Reeyuki" ]; then
              SHORT_SHA="${GITHUB_SHA::7}"

              curl -H "Content-Type: application/json" \
                -d "{
                  \"embeds\": [
                    {
                      \"author\": {
                        \"name\": \"${{ github.actor }}\",
                        \"icon_url\": \"https://cdn.discordapp.com/avatars/452491822871085066/681b465cc75317671a74b28a1c49cb7c.webp?size=160\"
                      },
                      \"fields\": [
                        {
                          \"name\": \"Commit\",
                          \"value\": \"\`${SHORT_SHA}\` - ${{ github.event.head_commit.message }}\",
                          \"inline\": false
                        }
                      ]
                    }
                  ]
                }" \
                "${{ secrets.DISCORD_WEBHOOK }}"

            else
              curl -H "Content-Type: application/json" \
                -d "{\"content\":\"[push] ${{ github.actor }} on ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.event.head_commit.message }}\n${{ github.event.head_commit.url }}\"}" \
                "${{ secrets.DISCORD_WEBHOOK }}"
            fi

            if git diff --name-only HEAD~1 HEAD | grep -q '^webos-desktop/'; then

              cd webos-desktop

              pnpm install --frozen-lockfile
              pnpm build

              HTML_FILE="$(find . -type f -name '*.html' ! -path '*/node_modules/*' | head -n 1)"

              if [ -n "$HTML_FILE" ] && [ -f "$HTML_FILE" ]; then

                SHA="${GITHUB_SHA::7}"
                SUBJECT="${{ github.event.head_commit.message }}"

                PAYLOAD=$(jq -n \
                  --arg sha "$SHA" \
                  --arg subject "$SUBJECT" \
                  --arg content "🚀 Built HTML for YukiOS from $SHA ($SUBJECT)" \
                  '{content: $content}')

                curl -F "payload_json=$PAYLOAD" \
                     -F "file1=@${HTML_FILE};type=text/html" \
                     "${{ secrets.DISCORD_BUILD_WEBHOOK }}"

              else
                echo "No HTML build output found, skipping upload"
              fi
            fi

            exit 0
          fi

          if [ "$EVENT" = "pull_request" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"[PR] ${{ github.actor }}\n${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK }}"
            exit 0
          fi

          if [ "$EVENT" = "issues" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"[Issue] ${{ github.event.issue.title }}\n${{ github.event.issue.html_url }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK }}"
            exit 0
          fi

          if [ "$EVENT" = "issue_comment" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"[Comment] ${{ github.actor }}\n${{ github.event.comment.body }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK }}"
            exit 0
          fi

          if [ "$EVENT" = "release" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"[Release] ${{ github.event.release.name }}\n${{ github.event.release.html_url }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK }}"
            exit 0
          fi

          if [ "$EVENT" = "watch" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"⭐ ${{ github.actor }} starred ${{ github.repository }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK }}"
            exit 0
          fi
